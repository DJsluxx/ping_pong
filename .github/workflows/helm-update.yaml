name: Bump Helm Chart.

on:
  push:
    branches: [main]
    paths:
      - "helm/**"
      - "k8s/**"

permissions:
  contents: write

jobs:
  bump-chart:
    runs-on: ubuntu-latest
    # skip if the commit was made by the release workflow
    if: "!contains(github.event.head_commit.message, '[[GitHub Actions]]: bump')"
    steps:
      - uses: actions/checkout@v4

      - name: Bump chart patch version
        run: |
          CURRENT=$(grep '^version:' helm/ping-pong/Chart.yaml | awk '{print $2}')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          sed -i "s/^version:.*/version: $NEW_VERSION/" helm/ping-pong/Chart.yaml

          echo "Bumped chart version: $CURRENT → $NEW_VERSION"

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add helm/ping-pong/Chart.yaml
          git diff --cached --quiet || git commit -m "[[GitHub Actions]]: bump chart patch version"
          git push
